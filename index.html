<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北海道旅 2026 ルートマップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #e8a020;
    --hakodate: #1565c0;
    --chitose: #2e7d32;
    --bg: #f0f4f8;
    --card: #fff;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: #2c3e50;
    font-size: 15px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a3a5c, #0d6efd);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-title { font-size: clamp(16px, 4vw, 22px); font-weight: 900; }
  .header-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  /* PLAN TOGGLE */
  .plan-toggle {
    background: var(--primary);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .plan-btn {
    padding: 8px 20px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 30px;
    background: transparent;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .plan-btn:hover { background: rgba(255,255,255,0.15); }
  .plan-btn.active { background: var(--accent); border-color: var(--accent); }

  /* MAP */
  #map {
    width: 100%;
    height: 52vw;
    min-height: 280px;
    max-height: 500px;
  }

  /* CONTROLS */
  .controls {
    background: var(--card);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid #dce3ec;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .ctrl-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .ctrl-btn.play  { background: #27ae60; color: #fff; }
  .ctrl-btn.pause { background: var(--accent); color: #fff; }
  .ctrl-btn.reset { background: #e74c3c; color: #fff; }
  .ctrl-btn:hover { transform: scale(1.1); }
  .progress-wrap {
    flex: 1;
    min-width: 120px;
  }
  .progress-bar-bg {
    background: #dce3ec;
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    cursor: pointer;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff6b35);
    border-radius: 8px;
    width: 0%;
    transition: width 0.15s linear;
  }
  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    flex-shrink: 0;
  }
  .speed-select {
    border: 1px solid #dce3ec;
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
    background: var(--bg);
  }

  /* CURRENT SPOT */
  .current-spot {
    background: var(--card);
    padding: 12px 16px;
    border-bottom: 1px solid #dce3ec;
    min-height: 52px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .spot-icon { font-size: 24px; flex-shrink: 0; }
  .spot-info { flex: 1; }
  .spot-name { font-size: 15px; font-weight: 900; }
  .spot-desc { font-size: 12px; color: #666; margin-top: 2px; }
  .spot-day-badge {
    background: var(--primary);
    color: #fff;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* TIMELINE LIST */
  .stops-wrap {
    padding: 14px 16px;
    overflow-x: auto;
  }
  .stops-scroll {
    display: flex;
    gap: 0;
    align-items: center;
    min-width: max-content;
    padding-bottom: 4px;
  }
  .stop-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0 4px;
    position: relative;
  }
  .stop-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: -18px;
    top: 16px;
    width: 36px;
    height: 2px;
    background: #dce3ec;
    z-index: 0;
  }
  .stop-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #dce3ec;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: all 0.2s;
    position: relative;
    z-index: 1;
  }
  .stop-item.active .stop-dot {
    background: var(--accent);
    transform: scale(1.25);
    box-shadow: 0 0 0 4px rgba(232,160,32,0.3);
  }
  .stop-item.visited .stop-dot { background: #27ae60; }
  .stop-label {
    font-size: 10px;
    font-weight: 700;
    margin-top: 4px;
    text-align: center;
    color: #666;
    max-width: 60px;
    line-height: 1.2;
  }
  .stop-item.active .stop-label { color: var(--accent); }
  .stop-item.visited .stop-label { color: #27ae60; }

  /* DAY SEPARATOR */
  .day-sep {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 6px;
  }
  .day-sep-line {
    width: 2px;
    height: 30px;
    background: linear-gradient(to bottom, #dce3ec, #bbb);
    margin-bottom: 2px;
  }
  .day-sep-label {
    font-size: 9px;
    font-weight: 700;
    color: #999;
    white-space: nowrap;
    transform: rotate(-60deg);
    transform-origin: center;
    margin-top: 6px;
  }

  /* INFO PANELS */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 12px 16px 20px;
  }
  .info-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--accent);
  }
  .info-card h4 {
    font-size: 13px;
    font-weight: 900;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .info-card ul { list-style: none; font-size: 12px; }
  .info-card ul li {
    padding: 5px 0;
    border-bottom: 1px solid #f0f4f8;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .info-card ul li:last-child { border-bottom: none; }
  .info-card ul li span:last-child { font-weight: 700; color: var(--primary); text-align: right; }

  @media (max-width: 480px) {
    .info-grid { grid-template-columns: 1fr; }
    #map { height: 60vw; min-height: 240px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-title">🗺️ 北海道旅 2026 ルートマップ</div>
    <div class="header-sub">7月24日〜27日　3泊4日　レンタカー旅のルートを地図で確認</div>
  </div>
</div>

<!-- PLAN TOGGLE -->
<div class="plan-toggle">
  <button class="plan-btn active" onclick="switchPlan('hakodate')">✈️ 函館IN/OUTプラン</button>
  <button class="plan-btn" onclick="switchPlan('chitose')">✈️ 新千歳IN/OUTプラン</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- CONTROLS -->
<div class="controls">
  <button class="ctrl-btn play"  onclick="playAnimation()"  title="再生">▶</button>
  <button class="ctrl-btn pause" onclick="pauseAnimation()" title="一時停止">⏸</button>
  <button class="ctrl-btn reset" onclick="resetAnimation()" title="最初に戻す">⏮</button>
  <div class="progress-wrap">
    <div style="font-size:11px;color:#666;margin-bottom:4px;" id="progress-label">スタート地点</div>
    <div class="progress-bar-bg" onclick="seekByClick(event)" id="progress-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="speed-wrap">
    <span>速度</span>
    <select class="speed-select" id="speed-select" onchange="setSpeed(this.value)">
      <option value="1">×1</option>
      <option value="2" selected>×2</option>
      <option value="4">×4</option>
      <option value="8">×8</option>
    </select>
  </div>
</div>

<!-- CURRENT SPOT -->
<div class="current-spot">
  <div class="spot-icon" id="spot-icon">✈️</div>
  <div class="spot-info">
    <div class="spot-name" id="spot-name">出発地点を選択してください</div>
    <div class="spot-desc" id="spot-desc">▶ ボタンでアニメーション開始</div>
  </div>
  <div class="spot-day-badge" id="spot-day">Day -</div>
</div>

<!-- STOPS TIMELINE -->
<div class="stops-wrap">
  <div class="stops-scroll" id="stops-scroll"></div>
</div>

<!-- INFO CARDS -->
<div class="info-grid">
  <div class="info-card">
    <h4>📍 立ち寄りスポット</h4>
    <ul id="spots-list"></ul>
  </div>
  <div class="info-card">
    <h4>🚗 移動距離・時間</h4>
    <ul id="distance-list"></ul>
  </div>
</div>

<script>
// ========== プランデータ ==========
const plans = {

      { lat: 41.7686, lng: 140.7288, name: '函館朝市', icon: '🦑', day: 'Day1', desc: '活イカ釣り・海鮮丼・元祖巴丼', time: '11:00' },
      { lat: 41.7984, lng: 140.7571, name: '函館塩ラーメン', icon: '🍜', day: 'Day1', desc: '麺厨房あじさい（澄んだ塩スープ）', time: '13:30' },
      { lat: 41.7966, lng: 140.7575, name: '五稜郭タワー', icon: '🏯', day: 'Day1', desc: '107mの展望台から星型要塞を一望', time: '15:00' },
      { lat: 41.7720, lng: 140.7260, name: 'ジンギスカン（夕食）', icon: '🥩', day: 'Day1', desc: '大門横丁エリアでジンギスカン', time: '18:00' },
      { lat: 41.7576, lng: 140.7151, name: '函館山ロープウェイ', icon: '🌃', day: 'Day1', desc: '世界三大夜景を堪能', time: '20:00' },
      { lat: 43.1950, lng: 140.4546, name: 'お食事処みさき（積丹）', icon: '🦔', day: 'Day2', desc: '赤バフンウニ丼の聖地。8:30着推奨', time: '10:00' },
      { lat: 43.1900, lng: 140.4580, name: '中村屋（積丹）', icon: '🦔', day: 'Day2', desc: 'バフン＆ムラサキウニ食べ比べ', time: '12:00' },
      { lat: 43.1907, lng: 140.9948, name: '小樽寿司屋通り', icon: '🍣', day: 'Day2', desc: 'ボタンエビ・カニ握り・ホタテ', time: '16:00' },

      { lat: 43.1862, lng: 140.9974, name: 'かま栄', icon: '🐟', day: 'Day3', desc: 'パンロール¥216。外せない小樽名物', time: '09:30' },
      { lat: 43.1876, lng: 140.9948, name: '山中牧場ソフト（小樽）', icon: '🍦', day: 'Day3', desc: '北海道産生乳100%の濃厚ソフト', time: '10:00' },
      { lat: 43.1892, lng: 140.9933, name: 'LeTAO', icon: '🧀', day: 'Day3', desc: 'ドゥーブルフロマージュ（本店）', time: '11:00' },
      { lat: 43.0618, lng: 141.3545, name: '二条市場（札幌）', icon: '🦀', day: 'Day3', desc: '毛ガニ・ボタンエビをつまみ食い', time: '14:30' },
      { lat: 43.0542, lng: 141.3556, name: 'スープカレー（札幌）', icon: '🍛', day: 'Day3', desc: 'ピカンティ or 奥芝商店', time: '17:00' },
      { lat: 43.0560, lng: 141.3517, name: 'ラーメン横丁（札幌）', icon: '🍜', day: 'Day3', desc: '元祖さっぽろラーメン横丁。味噌ハシゴ！', time: '19:30' },
      { lat: 43.0686, lng: 141.3507, name: '場外市場（札幌）', icon: '🦀', day: 'Day4', desc: '海鮮朝食＆お土産 冷凍便で発送', time: '07:00' },
      { lat: 43.0600, lng: 141.3534, name: '町村農場ソフト', icon: '🍦', day: 'Day4', desc: '大通公園店。¥440の濃厚ソフト', time: '09:00' },
      { lat: 41.7984, lng: 140.7571, name: '函館塩ラーメン（帰り）', icon: '🍜', day: 'Day4', desc: '旅の〆ラーメン。一文字など老舗へ', time: '13:30' },
      { lat: 41.7700, lng: 140.8225, name: '函館空港（帰路）', icon: '✈️', day: 'Day4', desc: '梅村→羽田　市澤→中部。お疲れ様！', time: '16:00' },
    ]
  },
  chitose: {
    name: '新千歳IN/OUTプラン',
    color: '#2e7d32',
    stops: [
      { lat: 42.7752, lng: 141.6920, name: '新千歳空港', icon: '✈️', day: 'Day1', desc: '梅村・市澤 合流。LCCで格安入り！レンタカーピックアップ', time: '09:00' },
      { lat: 43.1905, lng: 141.0027, name: '三角市場（小樽）', icon: '🦀', day: 'Day1', desc: 'ウニ丼・カニ汁で旅のスタート', time: '11:00' },
      { lat: 43.1892, lng: 140.9933, name: 'LeTAO ＆ かま栄', icon: '🧀', day: 'Day1', desc: 'LeTAOチーズケーキ＋パンロール食べ歩き', time: '13:00' },
      { lat: 43.1876, lng: 140.9948, name: '山中牧場ソフト（小樽）', icon: '🍦', day: 'Day1', desc: '小樽運河そばで濃厚ミルクソフト', time: '14:00' },
      { lat: 43.1907, lng: 140.9948, name: '小樽寿司屋通り', icon: '🍣', day: 'Day1', desc: 'ボタンエビ・カニ握り・ホタテ', time: '16:00' },
      { lat: 43.1900, lng: 141.0010, name: 'ジンギスカン（小樽）', icon: '🥩', day: 'Day1', desc: 'えいじん小樽店。海鮮→ラム肉で〆！', time: '18:30' },
      { lat: 43.1950, lng: 140.4546, name: 'お食事処みさき（積丹）', icon: '🦔', day: 'Day2', desc: '赤バフンウニ丼の聖地。8:30着推奨', time: '09:00' },
      { lat: 43.1900, lng: 140.4580, name: '中村屋（積丹）', icon: '🦔', day: 'Day2', desc: 'バフン＆ムラサキウニ食べ比べ', time: '11:00' },
      { lat: 43.0618, lng: 141.3545, name: '二条市場（札幌）', icon: '🦀', day: 'Day2', desc: '毛ガニ・ボタンエビをつまみ食い', time: '15:30' },

      { lat: 43.0560, lng: 141.3517, name: 'ラーメン横丁（札幌）', icon: '🍜', day: 'Day2', desc: '元祖さっぽろラーメン横丁。ハシゴ必至', time: '20:00' },
      { lat: 43.0686, lng: 141.3507, name: '場外市場（札幌）', icon: '🦀', day: 'Day3', desc: '毛ガニ朝食＆冷凍土産を手配', time: '07:00' },
      { lat: 43.0600, lng: 141.3534, name: '町村農場ソフト', icon: '🍦', day: 'Day3', desc: '大通公園店。¥440の老舗牧場ソフト', time: '09:00' },
      { lat: 41.7686, lng: 140.7288, name: '函館朝市', icon: '🦑', day: 'Day3', desc: '遅ランチで活イカ・ウニ・イクラを堪能', time: '14:00' },
      { lat: 41.7966, lng: 140.7575, name: '五稜郭タワー', icon: '🏯', day: 'Day3', desc: '北海道唯一の洋式城郭。夕暮れが絶景', time: '15:30' },
      { lat: 41.7984, lng: 140.7571, name: '函館塩ラーメン', icon: '🍜', day: 'Day3', desc: 'あじさい or 一文字で夕食', time: '18:00' },
      { lat: 41.7576, lng: 140.7151, name: '函館山ロープウェイ', icon: '🌃', day: 'Day3', desc: '世界三大夜景。旅のハイライト！', time: '20:00' },
      { lat: 41.7686, lng: 140.7288, name: '函館朝市（最終朝）', icon: '🦑', day: 'Day4', desc: '旅の最後に朝市で活イカ朝食', time: '07:00' },
      { lat: 41.7800, lng: 140.7180, name: '元町・赤レンガ散策', icon: '🏯', day: 'Day4', desc: '異国情緒の坂道と赤レンガ倉庫をぶらり', time: '09:00' },
      { lat: 42.7752, lng: 141.6920, name: '新千歳空港（帰路）', icon: '✈️', day: 'Day4', desc: '乗り捨てレンタカー返却。梅村→羽田 市澤→中部', time: '16:00' },
    ]
  }
};

// ========== MAP SETUP ==========
const map = L.map('map', { zoomControl: true, scrollWheelZoom: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

// State
let currentPlan = 'hakodate';
let animFrame = null;
let progress = 0; // 0.0 ~ 1.0
let isPlaying = false;
let speedMultiplier = 2;
let lastTimestamp = null;
let totalDuration = 18000; // ms for full route at x1

// Map elements
let routeLine = null;
let animLine = null;
let planeMarker = null;
let stopMarkers = [];
let allPoints = [];

// Custom icons
function makeIcon(emoji, size = 36) {
  return L.divIcon({
    html: `<div style="font-size:${size}px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));transform:translate(-50%,-50%)">${emoji}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    className: ''
  });
}

function makeStopIcon(emoji, color, active = false) {
  const border = active ? '3px solid #e8a020' : '2px solid #fff';
  const bg = active ? '#fff9e0' : '#fff';
  return L.divIcon({
    html: `<div style="background:${bg};border:${border};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.2);">${emoji}</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    className: ''
  });
}

// ========== INIT PLAN ==========
function initPlan(planKey) {
  currentPlan = planKey;
  const plan = plans[planKey];
  const stops = plan.stops;

  // Clear previous
  if (routeLine) map.removeLayer(routeLine);
  if (animLine) map.removeLayer(animLine);
  if (planeMarker) map.removeLayer(planeMarker);
  stopMarkers.forEach(m => map.removeLayer(m));
  stopMarkers = [];

  // All points = stop coordinates
  allPoints = stops.map(s => [s.lat, s.lng]);

  // Route (faded)
  routeLine = L.polyline(allPoints, {
    color: plan.color,
    weight: 3,
    opacity: 0.25,
    dashArray: '8,6'
  }).addTo(map);

  // Animated line (will grow)
  animLine = L.polyline([], {
    color: plan.color,
    weight: 4,
    opacity: 0.9
  }).addTo(map);

  // Stop markers
  stops.forEach((stop, i) => {
    const m = L.marker([stop.lat, stop.lng], { icon: makeStopIcon(stop.icon, plan.color) })
      .addTo(map)
      .bindPopup(`<b>${stop.icon} ${stop.name}</b><br><span style="color:#666;font-size:12px">${stop.day} ${stop.time}</span><br>${stop.desc}`, { maxWidth: 200 });
    stopMarkers.push(m);
  });

  // Plane marker at start
  planeMarker = L.marker(allPoints[0], { icon: makeIcon('✈️', 30), zIndexOffset: 1000 }).addTo(map);

  // Fit map
  map.fitBounds(L.latLngBounds(allPoints).pad(0.15));

  // Reset progress
  progress = 0;
  isPlaying = false;
  lastTimestamp = null;
  updateUI(0);
  renderStopsTimeline();
  renderInfoCards();
}

// ========== INTERPOLATE ALONG ROUTE ==========
function getPositionAtProgress(t) {
  // t: 0.0 ~ 1.0 along the stop array
  const stops = plans[currentPlan].stops;
  const n = stops.length - 1;
  const idx = t * n;
  const i = Math.min(Math.floor(idx), n - 1);
  const frac = idx - i;
  const a = allPoints[i];
  const b = allPoints[Math.min(i + 1, n)];
  return [a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac];
}

function getSegmentPoints(t) {
  const stops = plans[currentPlan].stops;
  const n = stops.length - 1;
  const idx = t * n;
  const i = Math.min(Math.floor(idx), n - 1);
  const frac = idx - i;
  const pts = allPoints.slice(0, i + 1);
  const b = allPoints[Math.min(i + 1, n)];
  pts.push([allPoints[i][0] + (b[0] - allPoints[i][0]) * frac,
             allPoints[i][1] + (b[1] - allPoints[i][1]) * frac]);
  return pts;
}

function getCurrentStopIndex(t) {
  const n = plans[currentPlan].stops.length - 1;
  return Math.min(Math.floor(t * n), n);
}

// ========== ANIMATION ==========
function playAnimation() {
  if (isPlaying) return;
  if (progress >= 1) progress = 0;
  isPlaying = true;
  lastTimestamp = null;
  animFrame = requestAnimationFrame(tick);
}

function pauseAnimation() {
  isPlaying = false;
  if (animFrame) cancelAnimationFrame(animFrame);
}

function resetAnimation() {
  pauseAnimation();
  progress = 0;
  updateUI(0);
}

function setSpeed(val) {
  speedMultiplier = parseFloat(val);
}

function seekByClick(e) {
  const rect = document.getElementById('progress-bg').getBoundingClientRect();
  const t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  progress = t;
  updateUI(t);
}

function tick(timestamp) {
  if (!isPlaying) return;
  if (!lastTimestamp) lastTimestamp = timestamp;
  const delta = timestamp - lastTimestamp;
  lastTimestamp = timestamp;

  const duration = totalDuration / speedMultiplier;
  progress += delta / duration;

  if (progress >= 1) {
    progress = 1;
    updateUI(1);
    isPlaying = false;
    return;
  }

  updateUI(progress);
  animFrame = requestAnimationFrame(tick);
}

function updateUI(t) {
  const pos = getPositionAtProgress(t);
  const pts = getSegmentPoints(t);
  const stopIdx = getCurrentStopIndex(t);
  const plan = plans[currentPlan];
  const stop = plan.stops[stopIdx];

  // Move plane
  if (planeMarker) planeMarker.setLatLng(pos);

  // Grow line
  if (animLine) animLine.setLatLngs(pts);

  // Progress bar
  document.getElementById('progress-fill').style.width = (t * 100) + '%';
  document.getElementById('progress-label').textContent =
    `${stop.day} ${stop.time} ｜ ${stop.icon} ${stop.name}`;

  // Current spot
  document.getElementById('spot-icon').textContent = stop.icon;
  document.getElementById('spot-name').textContent = stop.name;
  document.getElementById('spot-desc').textContent = stop.desc;
  document.getElementById('spot-day').textContent = `${stop.day} ${stop.time}`;

  // Stop dots
  document.querySelectorAll('.stop-item').forEach((el, i) => {
    el.classList.remove('active', 'visited');
    if (i < stopIdx) el.classList.add('visited');
    else if (i === stopIdx) el.classList.add('active');
  });

  // Center map on plane
  if (isPlaying) {
    map.panTo(pos, { animate: true, duration: 0.3 });
  }
}

// ========== RENDER TIMELINE ==========
function renderStopsTimeline() {
  const container = document.getElementById('stops-scroll');
  container.innerHTML = '';
  const plan = plans[currentPlan];
  let prevDay = null;
  plan.stops.forEach((stop, i) => {
    if (prevDay && stop.day !== prevDay) {
      const sep = document.createElement('div');
      sep.className = 'day-sep';
      sep.innerHTML = `<div class="day-sep-line"></div><div class="day-sep-label">${stop.day}</div>`;
      container.appendChild(sep);
    }
    const el = document.createElement('div');
    el.className = 'stop-item';
    el.setAttribute('data-index', i);
    el.innerHTML = `<div class="stop-dot">${stop.icon}</div><div class="stop-label">${stop.name.replace(/（.+）/, '')}</div>`;
    el.onclick = () => {
      pauseAnimation();
      const n = plan.stops.length - 1;
      progress = i / n;
      updateUI(progress);
      map.setView([stop.lat, stop.lng], 11, { animate: true });
    };
    container.appendChild(el);
    prevDay = stop.day;
  });
}

// ========== RENDER INFO CARDS ==========
function renderInfoCards() {
  const plan = plans[currentPlan];
  const stops = plan.stops;

  // Spots list
  const sl = document.getElementById('spots-list');
  sl.innerHTML = '';
  stops.forEach(s => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${s.icon} ${s.name.replace(/（.+）/, '')}</span><span>${s.day}</span>`;
    sl.appendChild(li);
  });

  // Distance
  const dl = document.getElementById('distance-list');
  const legs = [
    { label: '函館プラン: 函館→積丹', km: '約190km', time: '約3時間' },
    { label: '積丹→小樽', km: '約60km', time: '約1時間' },
    { label: '小樽→札幌', km: '約40km', time: '約40分' },
    { label: '札幌→函館', km: '約320km', time: '約3時間30分' },
  ];
  if (currentPlan === 'chitose') {
    legs.splice(0, legs.length,
      { label: '千歳→小樽', km: '約60km', time: '約1時間' },
      { label: '小樽→積丹', km: '約60km', time: '約1時間' },
      { label: '積丹→札幌', km: '約120km', time: '約2時間' },
      { label: '札幌→函館', km: '約320km', time: '約3時間30分' },
      { label: '函館→千歳', km: '約270km', time: '約4時間（乗捨）' },
    );
  }
  dl.innerHTML = '';
  legs.forEach(l => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${l.label}</span><span>${l.km} / ${l.time}</span>`;
    dl.appendChild(li);
  });
}

// ========== SWITCH PLAN ==========
function switchPlan(planKey) {
  pauseAnimation();
  document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  initPlan(planKey);
}

// ========== START ==========
initPlan('hakodate');
</script>
